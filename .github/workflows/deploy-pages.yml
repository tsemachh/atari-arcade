name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Stamp service worker cache version with commit SHA
        run: sed -i "s/arcade-v1/arcade-${GITHUB_SHA::8}/" sw.js
      - name: Stamp deploy time into build-info.json
        run: |
          printf '{ "deployedAt": "%s", "commit": "%s" }\n' \
            "$(date -u +'%Y-%m-%d %H:%M UTC')" "${GITHUB_SHA::8}" \
            > build-info.json
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
