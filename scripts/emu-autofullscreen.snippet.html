<!-- ARCADE-PATCH v3: arcade chrome for ?lib= launches. Re-apply via
     scripts/patch-emu.sh after replacing the AltirraSDL bundle files.

     Active only when the URL carries ?lib= (a picker launch). The stock
     desktop header is hidden from the FIRST frame (no flash of the full
     menu bar). Floating controls, all deliberate-tap only:
       ⌄  toggles a compact START/SELECT/OPTION/RESET row (our own HTML,
          driven by ATWasmConsoleSwitch — not the desktop bar)
       ☰  opens the Gaming-Mode menu
       AF auto-fire toggle (pulses the external trigger via ATWasmSetJoystick)
     ?tilt=1 adds device-orientation steering (external joystick export).
     ?fs=1 keeps the first-tap fullscreen behavior. -->
<style>
  body.arcade-mode > header { display: none !important; }

  .arcade-fab {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 8px);
    z-index: 2147483000;
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.28);
    background: rgba(20,26,38,.5);
    color: #fff; font-size: 22px; line-height: 1;
    display: none;
    align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }
  body.arcade-mode .arcade-fab { display: flex; }
  #arcade-fs-menu  { right: calc(env(safe-area-inset-right, 0px) + 10px); }
  #arcade-bar-show { right: calc(env(safe-area-inset-right, 0px) + 66px); font-size: 26px; }
  /* Fullscreen button: visible only while NOT fullscreen (and not an
     installed app) — one deliberate tap beats waiting for the armed
     first-tap to land. Hides itself once fullscreen engages. */
  #arcade-fs { right: calc(env(safe-area-inset-right, 0px) + 122px); font-size: 19px; }
  body.arcade-mode #arcade-fs { display: none; }
  body.arcade-mode.arcade-show-fs #arcade-fs { display: flex; }

  /* Auto-fire: a two-position slide switch like the AUTO FIRE toggle
     on classic joysticks — vertical track, ON/OFF markings, red knob
     that slides between them. Tucked under the on-canvas fire button. */
  #arcade-af {
    top: auto;
    /* The emulator draws fire A as a 72px circle centred 60px from the
       right edge, 48px above the bottom — the switch matches its width
       and sits centred in the strip directly below it. */
    bottom: calc(env(safe-area-inset-bottom, 0px) + 7px);
    right: calc(env(safe-area-inset-right, 0px) + 24px);
    width: 72px; height: 34px;
    border-radius: 9px;
    flex-direction: row;
    justify-content: space-between;
    padding: 0 7px 0 8px;
    font-size: 8px; font-weight: 800;
    font-family: ui-sans-serif, system-ui, sans-serif;
    letter-spacing: .06em;
    color: rgba(255,255,255,.45);
    background: linear-gradient(180deg, #202a3d, #0d1117);
    border: 2px solid rgba(255,255,255,.3);
    box-shadow: inset 0 2px 6px rgba(0,0,0,.7);
    position: fixed;
  }
  #arcade-af .af-lbl { position: relative; z-index: 1; line-height: 1; align-self: center; }
  /* the sliding red knob */
  #arcade-af::after {
    content: '';
    position: absolute;
    top: 3px; bottom: 3px; width: 31px;
    left: 3px;                     /* OFF = knob on the left */
    border-radius: 6px;
    background: linear-gradient(180deg, #f07a70 0%, #e53935 40%, #7f1010 100%);
    border: 1px solid #400808;
    box-shadow: inset 0 1px 2px rgba(255,255,255,.25),
                0 1px 3px rgba(0,0,0,.6);
    transition: left .12s ease;
  }
  #arcade-af.on::after {
    left: 34px;                    /* ON = knob slides right */
  }
  #arcade-af .af-on  { color: rgba(255,255,255,.45); }
  #arcade-af .af-off { color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.8); }
  #arcade-af.on .af-on  { color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.8); }
  #arcade-af.on .af-off { color: rgba(255,255,255,.45); text-shadow: none; }
  #arcade-af.on {
    border-color: #ff5c4d;
    box-shadow: inset 0 2px 6px rgba(0,0,0,.7),
                0 0 12px rgba(255,80,60,.55);
  }

  /* Tilt-steering toggle — upper right, under the ☰ corner button,
     well away from the fire zone. Shows a tilting-phone icon. */
  #arcade-tilt {
    top: calc(env(safe-area-inset-top, 0px) + 62px);
    right: calc(env(safe-area-inset-right, 0px) + 10px);
    width: 60px; height: 60px;
    color: rgba(255,255,255,.78);
  }
  #arcade-tilt svg { width: 38px; height: 38px; }
  #arcade-tilt.on {
    border-color: #5cc8ff;
    color: #5cc8ff;
    box-shadow: 0 0 12px rgba(92,200,255,.6);
  }

  /* Momentary START button above the TILT toggle — most games need it
     constantly (begin game / restart after death), so it earns a
     always-visible spot in the right-side stack. */
  #arcade-start {
    top: calc(env(safe-area-inset-top, 0px) + 132px);   /* right under TILT */
    right: calc(env(safe-area-inset-right, 0px) + 10px);
    width: 60px; height: 60px;
    font-size: 13px; font-weight: 800;
    font-family: ui-sans-serif, system-ui, sans-serif;
    letter-spacing: .04em;
    color: rgba(255,255,255,.85);
    background: rgba(40,50,75,.6);
  }
  #arcade-start:active {
    border-color: #ffd24a;
    color: #ffd24a;
    background: rgba(70,85,125,.8);
  }

  /* Phone-landscape viewports are short (~360-400px): compact the
     right-side stack so START stays clear of the ⌄/☰ corner buttons
     and AF stays above the on-canvas fire zone. */
  @media (max-height: 480px) {
    .arcade-fab { width: 40px; height: 40px; }
    #arcade-af    { bottom: calc(env(safe-area-inset-bottom, 0px) + 5px); width: 72px; height: 30px; }
    #arcade-af::after { width: 30px; left: 3px; top: 3px; bottom: 3px; }
    #arcade-af.on::after { left: 35px; }
    #arcade-tilt  { top: calc(env(safe-area-inset-top, 0px) + 54px); width: 52px; height: 52px; }
    #arcade-tilt svg { width: 32px; height: 32px; }
    #arcade-start { top: calc(env(safe-area-inset-top, 0px) + 114px); bottom: auto; width: 52px; height: 52px; font-size: 11px; }
  }

  /* Compact console-keys row (replaces the desktop bar for play). */
  #arcade-keys {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 8px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 2147483000;
    display: none;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.22);
    background: rgba(13,17,23,.72);
  }
  body.arcade-mode.arcade-keys-open #arcade-keys { display: flex; }
  #arcade-keys button {
    font: 700 14px/1 ui-monospace, Menlo, monospace;
    letter-spacing: .04em;
    color: #e6eefc;
    background: rgba(60,60,80,.85);
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 8px;
    padding: 10px 14px;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  #arcade-keys button:active { background: rgba(110,110,150,.95); }
  #arcade-keys .ak-back  { background: rgba(30,45,70,.85); }
  #arcade-keys .ak-reset { background: rgba(90,35,35,.85); }
</style>
<div id="arcade-keys" aria-label="Console keys">
  <button type="button" class="ak-back"  data-act="back">&#11013;</button>
  <button type="button" data-key="1">START</button>
  <button type="button" data-key="2">SELECT</button>
  <button type="button" data-key="4">OPTION</button>
  <button type="button" class="ak-reset" data-act="reset">RESET</button>
</div>
<button type="button" id="arcade-fs" class="arcade-fab" aria-label="Full screen">&#x26F6;</button>
<button type="button" id="arcade-bar-show" class="arcade-fab" aria-label="Console keys">&#x2304;</button>
<button type="button" id="arcade-fs-menu" class="arcade-fab" aria-label="Menu">&#9776;</button>
<button type="button" id="arcade-af" class="arcade-fab" aria-label="Auto-fire"><span class="af-lbl af-off">OFF</span><span class="af-lbl af-on">ON</span></button>
<button type="button" id="arcade-tilt" class="arcade-fab" aria-label="Tilt steering"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4.6" y="5.6" width="14.8" height="9.2" rx="1.7" transform="rotate(-12 12 10.2)"/><path d="M4.4 17.6 Q 12 22.8 19.6 17.6"/><path d="M4.4 17.6 l2.8 -0.6 M4.4 17.6 l1 2.6"/><path d="M19.6 17.6 l-2.8 -0.6 M19.6 17.6 l-1 2.6"/></svg></button>
<button type="button" id="arcade-start" class="arcade-fab" aria-label="Start">START</button>
<script>
  (function () {
    var params;
    try { params = new URLSearchParams(location.search); } catch (e) { params = null; }
    var ARCADE = !!(params && (params.get('lib') || '').length);
    if (!ARCADE) return;          // full desktop UI stays untouched

    var body = document.body;
    body.classList.add('arcade-mode');   // header hidden before first paint
    var KEYS_HIDE_DELAY = 6000;
    var keysTimer = null;

    function refit() {
      try { window.dispatchEvent(new Event('resize')); } catch (e) {}
      requestAnimationFrame(function () {
        try { window.dispatchEvent(new Event('resize')); } catch (e) {}
      });
    }
    refit();  // reclaim the header space immediately

    // ---- compact console-keys row -------------------------------------
    function armKeysHide() {
      if (keysTimer) clearTimeout(keysTimer);
      keysTimer = setTimeout(function () {
        body.classList.remove('arcade-keys-open');
      }, KEYS_HIDE_DELAY);
    }
    var showBtn = document.getElementById('arcade-bar-show');
    if (showBtn) showBtn.addEventListener('click', function (e) {
      e.preventDefault(); e.stopPropagation();
      body.classList.toggle('arcade-keys-open');
      if (body.classList.contains('arcade-keys-open')) armKeysHide();
    });

    var keys = document.getElementById('arcade-keys');
    function consoleSwitch(bit, down) {
      try { if (window.Module && Module._ATWasmConsoleSwitch) Module._ATWasmConsoleSwitch(bit, down ? 1 : 0); } catch (e) {}
    }
    if (keys) {
      // true hold semantics: down on touch, up on release/cancel
      keys.addEventListener('pointerdown', function (e) {
        var b = e.target.closest('button'); if (!b) return;
        e.preventDefault();
        armKeysHide();
        if (b.dataset.key) {
          var bit = parseInt(b.dataset.key, 10);
          consoleSwitch(bit, true);
          var up = function () {
            consoleSwitch(bit, false);
            b.removeEventListener('pointerup', up);
            b.removeEventListener('pointercancel', up);
            b.removeEventListener('pointerleave', up);
          };
          b.addEventListener('pointerup', up);
          b.addEventListener('pointercancel', up);
          b.addEventListener('pointerleave', up);
        }
      });
      keys.addEventListener('click', function (e) {
        var b = e.target.closest('button'); if (!b) return;
        if (b.dataset.act === 'back') {
          var back = (params && params.get('back_url')) || '../';
          location.href = back;
        } else if (b.dataset.act === 'reset') {
          if (window.confirm('Cold reset the emulator?')) {
            try { if (window.Module && Module._ATWasmColdReset) Module._ATWasmColdReset(); } catch (err) {}
          }
        }
      });
    }

    // ---- floating START button (momentary, true hold) -------------------
    var startBtn = document.getElementById('arcade-start');
    if (startBtn) startBtn.addEventListener('pointerdown', function (e) {
      e.preventDefault(); e.stopPropagation();
      consoleSwitch(1, true);
      var up = function () {
        consoleSwitch(1, false);
        startBtn.removeEventListener('pointerup', up);
        startBtn.removeEventListener('pointercancel', up);
        startBtn.removeEventListener('pointerleave', up);
      };
      startBtn.addEventListener('pointerup', up);
      startBtn.addEventListener('pointercancel', up);
      startBtn.addEventListener('pointerleave', up);
    });

    // ---- menu button ---------------------------------------------------
    function openMenu() {
      try { if (window.Module && Module._ATWasmOpenMenu) { Module._ATWasmOpenMenu(); return; } } catch (e) {}
      var b = document.getElementById('btn-menu');
      if (b) b.click();
    }
    var fsBtn = document.getElementById('arcade-fs-menu');
    if (fsBtn) fsBtn.addEventListener('click', function (e) { e.preventDefault(); openMenu(); });

    // ---- external joystick state (tilt + auto-fire share one writer) ---
    var ext = { mask: 0, fire: false };
    function pushExt() {
      try { if (window.Module && Module._ATWasmSetJoystick) Module._ATWasmSetJoystick(ext.mask, ext.fire ? 1 : 0); } catch (e) {}
    }

    // ---- auto-fire toggle (~11 Hz pulse on the external trigger) -------
    var afBtn = document.getElementById('arcade-af');
    var afTimer = null;
    if (afBtn) afBtn.addEventListener('click', function (e) {
      e.preventDefault(); e.stopPropagation();
      if (afTimer) {
        clearInterval(afTimer); afTimer = null;
        afBtn.classList.remove('on');
        ext.fire = false; pushExt();
      } else {
        afBtn.classList.add('on');
        afTimer = setInterval(function () {
          ext.fire = !ext.fire; pushExt();
        }, 45);
      }
    });

    // ---- tilt steering --------------------------------------------------
    // A TILT toggle button is available in EVERY game; games launched
    // with ?tilt=1 (games.json "tilt" flag) start with it enabled.
    // Each enable recalibrates neutral to however the phone is held at
    // that moment. Forward/back gets ~2x the sensitivity of left/right
    // (4° vs 7°): accelerating tilts the screen away from the eyes, so
    // the less physical travel it needs, the more readable the game
    // stays while holding a speed.
    var tiltNeutral = null;
    var tiltOn = false;
    var DEAD_LR = 7;       // degrees of deadzone, left/right steer
    var DEAD_UD = 2.5;     // degrees of deadzone, forward/back — extra light so
                           // accelerating barely tips the screen away from the eyes
    var tiltBtn = document.getElementById('arcade-tilt');
    function onTilt(ev) {
      if (ev.beta == null || ev.gamma == null) return;
      var angle = 0;
      try { angle = (screen.orientation && screen.orientation.angle) || window.orientation || 0; } catch (e) {}
      var lr, ud;                       // degrees: +lr = tilt right, +ud = tilt forward
      if (angle === 90)        { lr = ev.beta;   ud = -ev.gamma; }
      else if (angle === -90 ||
               angle === 270)  { lr = -ev.beta;  ud = ev.gamma; }
      else if (angle === 180)  { lr = -ev.gamma; ud = -ev.beta; }
      else                     { lr = ev.gamma;  ud = ev.beta; }
      if (!tiltNeutral) tiltNeutral = { lr: lr, ud: ud };
      var dlr = lr - tiltNeutral.lr;
      var dud = ud - tiltNeutral.ud;
      var mask = 0;                     // bit0 L, bit1 R, bit2 U, bit3 D
      if (dlr < -DEAD_LR) mask |= 1; else if (dlr > DEAD_LR) mask |= 2;
      if (dud < -DEAD_UD) mask |= 4; else if (dud > DEAD_UD) mask |= 8;
      if (mask !== ext.mask) { ext.mask = mask; pushExt(); }
    }
    function startTilt() {
      tiltNeutral = null;               // neutral = how the phone is held right now
      window.addEventListener('deviceorientation', onTilt);
      tiltOn = true;
      if (tiltBtn) tiltBtn.classList.add('on');
    }
    function stopTilt() {
      window.removeEventListener('deviceorientation', onTilt);
      tiltOn = false;
      if (tiltBtn) tiltBtn.classList.remove('on');
      if (ext.mask) { ext.mask = 0; pushExt(); }   // centre the stick
    }
    function enableTilt() {
      if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
        // iOS: sensor access needs a user-gesture-driven permission ask
        DeviceOrientationEvent.requestPermission().then(function (r) {
          if (r === 'granted') startTilt();
        }).catch(function () {});
      } else {
        startTilt();
      }
    }
    if (tiltBtn) tiltBtn.addEventListener('click', function (e) {
      e.preventDefault(); e.stopPropagation();
      if (tiltOn) stopTilt(); else enableTilt();
    });
    if (params && params.get('tilt') === '1') {
      if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
        // iOS can't auto-start without a gesture; piggyback on the first tap
        var askTilt = function () {
          document.removeEventListener('pointerdown', askTilt, true);
          enableTilt();
        };
        document.addEventListener('pointerdown', askTilt, true);
      } else {
        startTilt();
      }
    }

    // ---- explicit fullscreen button (shown only when not fullscreen) ----
    var fsBtn2 = document.getElementById('arcade-fs');
    function isAppMode() {
      try {
        return (window.matchMedia && (window.matchMedia('(display-mode: fullscreen)').matches ||
                                      window.matchMedia('(display-mode: standalone)').matches)) ||
               window.navigator.standalone === true;
      } catch (e) { return false; }
    }
    function updateFsBtn() {
      var want = !isAppMode() && !document.fullscreenElement &&
                 !!document.documentElement.requestFullscreen;
      body.classList.toggle('arcade-show-fs', want);
    }
    if (fsBtn2) {
      fsBtn2.addEventListener('click', function (e) {
        e.preventDefault(); e.stopPropagation();
        try {
          document.documentElement.requestFullscreen({ navigationUI: 'hide' }).catch(function () {});
        } catch (err) {}
      });
      document.addEventListener('fullscreenchange', updateFsBtn);
      updateFsBtn();
    }

    // ---- ?fs=1 : tap enters fullscreen ---------------------------------
    // Android Chrome rejects fullscreen requests made from start-of-touch
    // events (pointerdown/touchstart) — only end-of-gesture events carry
    // reliable user activation. So we arm on pointerup/touchend/click and
    // keep retrying on every tap until fullscreen actually takes; the
    // listeners are removed only on success.
    try {
      if (params.get('fs') === '1' && document.documentElement.requestFullscreen) {
        var fsEvents = ['pointerup', 'touchend', 'click'];
        var fsDisarm = function () {
          fsEvents.forEach(function (n) { document.removeEventListener(n, fsArm, true); });
        };
        var fsArm = function (ev) {
          var t = ev.target;
          if (t && t.closest && t.closest('.arcade-fab, #arcade-keys')) return;
          if (document.fullscreenElement) { fsDisarm(); return; }
          document.documentElement.requestFullscreen({ navigationUI: 'hide' })
            .then(fsDisarm, function () { /* rejected — stay armed, retry next tap */ });
        };
        fsEvents.forEach(function (n) { document.addEventListener(n, fsArm, true); });
      }
    } catch (e) {}
  })();
</script>
<!-- GoatCounter analytics: counts each emulator launch incl. the ?lib=
     query, so the dashboard doubles as a per-game popularity table. -->
<script data-goatcounter="https://atari-arcade.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
