<!-- ARCADE-PATCH v3: arcade chrome for ?lib= launches. Re-apply via
     scripts/patch-emu.sh after replacing the AltirraSDL bundle files.

     Active only when the URL carries ?lib= (a picker launch). The stock
     desktop header is hidden from the FIRST frame (no flash of the full
     menu bar). Floating controls, all deliberate-tap only:
       ⌄  toggles a compact START/SELECT/OPTION/RESET row (our own HTML,
          driven by ATWasmConsoleSwitch — not the desktop bar)
       ☰  opens the Gaming-Mode menu
       AF auto-fire toggle (pulses the external trigger via ATWasmSetJoystick)
     ?tilt=1 adds device-orientation steering (external joystick export).
     ?fs=1 keeps the first-tap fullscreen behavior. -->
<style>
  body.arcade-mode > header { display: none !important; }

  .arcade-fab {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 8px);
    z-index: 2147483000;
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.28);
    background: rgba(20,26,38,.5);
    color: #fff; font-size: 22px; line-height: 1;
    display: none;
    align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }
  body.arcade-mode .arcade-fab { display: flex; }
  #arcade-fs-menu  { right: calc(env(safe-area-inset-right, 0px) + 10px); }
  #arcade-bar-show { right: calc(env(safe-area-inset-right, 0px) + 66px); font-size: 26px; }

  /* Auto-fire toggle sits low on the right, above the on-canvas fire
     zone — styled after the CX40 joystick's red dome button. */
  #arcade-af {
    top: auto;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 150px);
    right: calc(env(safe-area-inset-right, 0px) + 10px);
    font-size: 13px; font-weight: 800;
    font-family: ui-sans-serif, system-ui, sans-serif;
    letter-spacing: .03em;
    color: rgba(255,255,255,.9);
    background: radial-gradient(circle at 34% 30%,
                #ff8a80 0%, #e53935 35%, #b71c1c 75%, #7f1010 100%);
    border: 2px solid #5a0c0c;
    box-shadow: inset 0 -3px 6px rgba(0,0,0,.45),
                inset 0 2px 3px rgba(255,255,255,.35),
                0 2px 5px rgba(0,0,0,.5);
    opacity: .82;
    text-shadow: 0 1px 2px rgba(0,0,0,.6);
  }
  #arcade-af.on {
    opacity: 1;
    border-color: #ffd24a;
    box-shadow: inset 0 -3px 6px rgba(0,0,0,.45),
                inset 0 2px 3px rgba(255,255,255,.35),
                0 0 14px 3px rgba(255,80,60,.75);
  }

  /* Tilt-steering toggle, stacked above the AF button. */
  #arcade-tilt {
    top: auto;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 210px);
    right: calc(env(safe-area-inset-right, 0px) + 10px);
    font-size: 11px; font-weight: 800;
    font-family: ui-sans-serif, system-ui, sans-serif;
    letter-spacing: .04em;
    color: rgba(255,255,255,.75);
  }
  #arcade-tilt.on {
    border-color: #5cc8ff;
    color: #5cc8ff;
    box-shadow: 0 0 12px rgba(92,200,255,.6);
  }

  /* Compact console-keys row (replaces the desktop bar for play). */
  #arcade-keys {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 8px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 2147483000;
    display: none;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.22);
    background: rgba(13,17,23,.72);
    backdrop-filter: blur(3px);
  }
  body.arcade-mode.arcade-keys-open #arcade-keys { display: flex; }
  #arcade-keys button {
    font: 700 14px/1 ui-monospace, Menlo, monospace;
    letter-spacing: .04em;
    color: #e6eefc;
    background: rgba(60,60,80,.85);
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 8px;
    padding: 10px 14px;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  #arcade-keys button:active { background: rgba(110,110,150,.95); }
  #arcade-keys .ak-back  { background: rgba(30,45,70,.85); }
  #arcade-keys .ak-reset { background: rgba(90,35,35,.85); }
</style>
<div id="arcade-keys" aria-label="Console keys">
  <button type="button" class="ak-back"  data-act="back">&#11013;</button>
  <button type="button" data-key="1">START</button>
  <button type="button" data-key="2">SELECT</button>
  <button type="button" data-key="4">OPTION</button>
  <button type="button" class="ak-reset" data-act="reset">RESET</button>
</div>
<button type="button" id="arcade-bar-show" class="arcade-fab" aria-label="Console keys">&#x2304;</button>
<button type="button" id="arcade-fs-menu" class="arcade-fab" aria-label="Menu">&#9776;</button>
<button type="button" id="arcade-af" class="arcade-fab" aria-label="Auto-fire">AF</button>
<button type="button" id="arcade-tilt" class="arcade-fab" aria-label="Tilt steering">TILT</button>
<script>
  (function () {
    var params;
    try { params = new URLSearchParams(location.search); } catch (e) { params = null; }
    var ARCADE = !!(params && (params.get('lib') || '').length);
    if (!ARCADE) return;          // full desktop UI stays untouched

    var body = document.body;
    body.classList.add('arcade-mode');   // header hidden before first paint
    var KEYS_HIDE_DELAY = 6000;
    var keysTimer = null;

    function refit() {
      try { window.dispatchEvent(new Event('resize')); } catch (e) {}
      requestAnimationFrame(function () {
        try { window.dispatchEvent(new Event('resize')); } catch (e) {}
      });
    }
    refit();  // reclaim the header space immediately

    // ---- compact console-keys row -------------------------------------
    function armKeysHide() {
      if (keysTimer) clearTimeout(keysTimer);
      keysTimer = setTimeout(function () {
        body.classList.remove('arcade-keys-open');
      }, KEYS_HIDE_DELAY);
    }
    var showBtn = document.getElementById('arcade-bar-show');
    if (showBtn) showBtn.addEventListener('click', function (e) {
      e.preventDefault(); e.stopPropagation();
      body.classList.toggle('arcade-keys-open');
      if (body.classList.contains('arcade-keys-open')) armKeysHide();
    });

    var keys = document.getElementById('arcade-keys');
    function consoleSwitch(bit, down) {
      try { if (window.Module && Module._ATWasmConsoleSwitch) Module._ATWasmConsoleSwitch(bit, down ? 1 : 0); } catch (e) {}
    }
    if (keys) {
      // true hold semantics: down on touch, up on release/cancel
      keys.addEventListener('pointerdown', function (e) {
        var b = e.target.closest('button'); if (!b) return;
        e.preventDefault();
        armKeysHide();
        if (b.dataset.key) {
          var bit = parseInt(b.dataset.key, 10);
          consoleSwitch(bit, true);
          var up = function () {
            consoleSwitch(bit, false);
            b.removeEventListener('pointerup', up);
            b.removeEventListener('pointercancel', up);
            b.removeEventListener('pointerleave', up);
          };
          b.addEventListener('pointerup', up);
          b.addEventListener('pointercancel', up);
          b.addEventListener('pointerleave', up);
        }
      });
      keys.addEventListener('click', function (e) {
        var b = e.target.closest('button'); if (!b) return;
        if (b.dataset.act === 'back') {
          var back = (params && params.get('back_url')) || '../';
          location.href = back;
        } else if (b.dataset.act === 'reset') {
          if (window.confirm('Cold reset the emulator?')) {
            try { if (window.Module && Module._ATWasmColdReset) Module._ATWasmColdReset(); } catch (err) {}
          }
        }
      });
    }

    // ---- menu button ---------------------------------------------------
    function openMenu() {
      try { if (window.Module && Module._ATWasmOpenMenu) { Module._ATWasmOpenMenu(); return; } } catch (e) {}
      var b = document.getElementById('btn-menu');
      if (b) b.click();
    }
    var fsBtn = document.getElementById('arcade-fs-menu');
    if (fsBtn) fsBtn.addEventListener('click', function (e) { e.preventDefault(); openMenu(); });

    // ---- external joystick state (tilt + auto-fire share one writer) ---
    var ext = { mask: 0, fire: false };
    function pushExt() {
      try { if (window.Module && Module._ATWasmSetJoystick) Module._ATWasmSetJoystick(ext.mask, ext.fire ? 1 : 0); } catch (e) {}
    }

    // ---- auto-fire toggle (~11 Hz pulse on the external trigger) -------
    var afBtn = document.getElementById('arcade-af');
    var afTimer = null;
    if (afBtn) afBtn.addEventListener('click', function (e) {
      e.preventDefault(); e.stopPropagation();
      if (afTimer) {
        clearInterval(afTimer); afTimer = null;
        afBtn.classList.remove('on');
        ext.fire = false; pushExt();
      } else {
        afBtn.classList.add('on');
        afTimer = setInterval(function () {
          ext.fire = !ext.fire; pushExt();
        }, 45);
      }
    });

    // ---- tilt steering --------------------------------------------------
    // A TILT toggle button is available in EVERY game; games launched
    // with ?tilt=1 (games.json "tilt" flag) start with it enabled.
    // Each enable recalibrates neutral to however the phone is held at
    // that moment. Forward/back gets ~2x the sensitivity of left/right
    // (4° vs 7°): accelerating tilts the screen away from the eyes, so
    // the less physical travel it needs, the more readable the game
    // stays while holding a speed.
    var tiltNeutral = null;
    var tiltOn = false;
    var DEAD_LR = 7;       // degrees of deadzone, left/right steer
    var DEAD_UD = 4;       // degrees of deadzone, forward/back (accelerate/brake)
    var tiltBtn = document.getElementById('arcade-tilt');
    function onTilt(ev) {
      if (ev.beta == null || ev.gamma == null) return;
      var angle = 0;
      try { angle = (screen.orientation && screen.orientation.angle) || window.orientation || 0; } catch (e) {}
      var lr, ud;                       // degrees: +lr = tilt right, +ud = tilt forward
      if (angle === 90)        { lr = ev.beta;   ud = -ev.gamma; }
      else if (angle === -90 ||
               angle === 270)  { lr = -ev.beta;  ud = ev.gamma; }
      else if (angle === 180)  { lr = -ev.gamma; ud = -ev.beta; }
      else                     { lr = ev.gamma;  ud = ev.beta; }
      if (!tiltNeutral) tiltNeutral = { lr: lr, ud: ud };
      var dlr = lr - tiltNeutral.lr;
      var dud = ud - tiltNeutral.ud;
      var mask = 0;                     // bit0 L, bit1 R, bit2 U, bit3 D
      if (dlr < -DEAD_LR) mask |= 1; else if (dlr > DEAD_LR) mask |= 2;
      if (dud < -DEAD_UD) mask |= 4; else if (dud > DEAD_UD) mask |= 8;
      if (mask !== ext.mask) { ext.mask = mask; pushExt(); }
    }
    function startTilt() {
      tiltNeutral = null;               // neutral = how the phone is held right now
      window.addEventListener('deviceorientation', onTilt);
      tiltOn = true;
      if (tiltBtn) tiltBtn.classList.add('on');
    }
    function stopTilt() {
      window.removeEventListener('deviceorientation', onTilt);
      tiltOn = false;
      if (tiltBtn) tiltBtn.classList.remove('on');
      if (ext.mask) { ext.mask = 0; pushExt(); }   // centre the stick
    }
    function enableTilt() {
      if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
        // iOS: sensor access needs a user-gesture-driven permission ask
        DeviceOrientationEvent.requestPermission().then(function (r) {
          if (r === 'granted') startTilt();
        }).catch(function () {});
      } else {
        startTilt();
      }
    }
    if (tiltBtn) tiltBtn.addEventListener('click', function (e) {
      e.preventDefault(); e.stopPropagation();
      if (tiltOn) stopTilt(); else enableTilt();
    });
    if (params && params.get('tilt') === '1') {
      if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
        // iOS can't auto-start without a gesture; piggyback on the first tap
        var askTilt = function () {
          document.removeEventListener('pointerdown', askTilt, true);
          enableTilt();
        };
        document.addEventListener('pointerdown', askTilt, true);
      } else {
        startTilt();
      }
    }

    // ---- ?fs=1 : first tap enters fullscreen ---------------------------
    try {
      if (params.get('fs') === '1' && !document.fullscreenElement && document.documentElement.requestFullscreen) {
        var arm = function (ev) {
          var t = ev.target;
          if (t && t.closest && t.closest('.arcade-fab, #arcade-keys')) return;
          document.removeEventListener('pointerdown', arm, true);
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen({ navigationUI: 'hide' }).catch(function () {});
          }
        };
        document.addEventListener('pointerdown', arm, true);
      }
    } catch (e) {}
  })();
</script>
