<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Atari Arcade — 3D</title>
    <meta name="theme-color" content="#0d1117" />
    <link rel="icon" href="../icons/icon-192.png" />
    <style>
      :root { --accent: #5cc8ff; --muted: #9db0d3; --border: rgba(255,255,255,.18); }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden;
        background: radial-gradient(120% 90% at 50% -20%, #10192b 0%, #0d1117 55%, #05070c 100%);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        color: #e6eefc; }
      #stars { position: fixed; inset: 0; z-index: 0; }

      .ui.top { position: fixed; left: 0; right: 0; z-index: 5; text-align: center;
                top: calc(env(safe-area-inset-top, 0px) + 10px); pointer-events: none; }
      .ui.top h1 { margin: 0; font-size: 19px; letter-spacing: .1em; font-weight: 800;
                   text-shadow: 0 0 18px rgba(92,200,255,.6); }
      .ui.top h1 span { color: var(--accent); }
      .bar { margin: 8px auto 0; display: flex; flex-wrap: wrap; justify-content: center;
             gap: 6px; max-width: 96vw; pointer-events: auto; }
      .bar input { width: min(220px, 40vw); padding: 7px 12px; font-size: 13px;
        border-radius: 999px; border: 1px solid var(--border);
        background: rgba(19,26,38,.8); color: #e6eefc; outline: none; }
      .bar input:focus { border-color: var(--accent); }
      .chip { border: 1px solid var(--border); background: rgba(19,26,38,.8);
              color: var(--muted); border-radius: 999px; padding: 6px 12px;
              font-size: 12px; cursor: pointer; }
      .chip.active { border-color: var(--accent); color: var(--accent); }

      /* ---- the stream ---- */
      #stage { position: fixed; inset: 0; z-index: 1;
               display: flex; align-items: center;
               cursor: grab; touch-action: none; }
      #stage.dragging { cursor: grabbing; }
      #line { position: relative; height: var(--cardH); width: 100%; }
      .card { position: absolute; top: 0; left: 0;
              width: var(--cardW); height: var(--cardH);
              border-radius: 12px; overflow: hidden;
              border: 1px solid rgba(92,200,255,.25);
              background: #0d1117;
              box-shadow: 0 12px 32px rgba(0,0,0,.55);
              will-change: transform;
              user-select: none; -webkit-user-select: none; }
      .card img { width: 100%; height: calc(100% - 34px); object-fit: cover; display: block;
                  pointer-events: none; }
      .card .nm { height: 34px; display: flex; align-items: center; justify-content: center;
                  font-size: 14px; font-weight: 700; letter-spacing: .02em;
                  background: #131a26; border-top: 1px solid rgba(92,200,255,.2);
                  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 8px; }
      .card.active { border-color: var(--accent);
                     box-shadow: 0 0 24px rgba(92,200,255,.55), 0 12px 32px rgba(0,0,0,.55); }
      .card::after { content: ''; position: absolute; left: 0; right: 0; top: 100%; height: 40%;
                     background: linear-gradient(180deg, rgba(92,200,255,.12), transparent); }

      /* scanner line at the centre */
      #scanner { position: fixed; z-index: 2; top: 50%; left: 50%;
                 width: 2px; height: min(52vh, 420px);
                 transform: translate(-50%, -50%);
                 background: linear-gradient(180deg, transparent, var(--accent), transparent);
                 box-shadow: 0 0 18px 3px rgba(92,200,255,.55);
                 opacity: .8; pointer-events: none; }

      #tip { position: fixed; left: 50%; transform: translateX(-50%); z-index: 5;
             bottom: calc(env(safe-area-inset-bottom, 0px) + 58px);
             color: #e6eefc; font-size: 17px; font-weight: 800; letter-spacing: .03em;
             text-shadow: 0 0 12px rgba(92,200,255,.9); pointer-events: none; }
      .ui.bottom { position: fixed; left: 0; right: 0; z-index: 5; text-align: center;
                   bottom: calc(env(safe-area-inset-bottom, 0px) + 12px); pointer-events: none; }
      .ui.bottom a { pointer-events: auto; color: var(--accent); text-decoration: none;
                     font-size: 13px; border: 1px solid rgba(92,200,255,.4);
                     border-radius: 999px; padding: 7px 16px; background: rgba(13,17,23,.6); }
      .ui.bottom .hint { display: block; color: var(--muted); font-size: 11px; margin-top: 6px; }
      #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
                 color: var(--muted); font-size: 14px; z-index: 6; background: #05070c;
                 transition: opacity .4s; }
    </style>
  </head>
  <body>
    <canvas id="stars"></canvas>
    <div class="ui top">
      <h1>ATARI <span>ARCADE</span> · 3D</h1>
      <div class="bar" id="bar">
        <input type="search" id="q" placeholder="Search…" autocomplete="off" />
      </div>
    </div>
    <div id="stage"><div id="line"></div></div>
    <div id="scanner"></div>
    <div id="tip"></div>
    <div class="ui bottom">
      <a href="../">&larr; classic view</a>
      <span class="hint">drag / scroll &middot; tap a poster to play &middot; Enter plays the scanned card</span>
    </div>
    <div id="loading">Booting the arcade&hellip;</div>

    <script>
      (function () {
        "use strict";
        var stage = document.getElementById("stage");
        var line = document.getElementById("line");
        var tip = document.getElementById("tip");
        var bar = document.getElementById("bar");
        var qEl = document.getElementById("q");
        var loading = document.getElementById("loading");

        function cardW() { return Math.min(420, Math.max(230, window.innerWidth * 0.31)); }
        function applySizes() {
          var w = cardW(), h = Math.round(w * 240 / 336) + 34;
          document.documentElement.style.setProperty("--cardW", w + "px");
          document.documentElement.style.setProperty("--cardH", h + "px");
        }
        applySizes();

        var tvMode = false;
        try { tvMode = new URLSearchParams(location.search).get("tv") === "1"; } catch (e) {}

        function launchUrl(g) {
          var url = "../emu/?lib=" + encodeURIComponent(g.file) +
            "&fs=1&pal=1&crt=0&experience=convenient&addons=off";
          if (g.joystick) url += "&joystick=" + encodeURIComponent(g.joystick);
          if (g.tilt) url += "&tilt=1";
          url += "&back_url=../3d/&back_label=" + encodeURIComponent("⬅ Games");
          if (tvMode) url += "&tv=1";
          return url;
        }

        var CATS = [["all","All"],["shooter","Shooters"],["platformer","Platformers"],
                    ["maze","Maze"],["racing","Racing"],["action","Action"],["sports","Sports"]];
        var allGames = [], currentCat = "all", query = "";
        var cards = [], N = 0, offset = 0, span = 0;

        function rebuild() {
          line.textContent = "";
          cards = [];
          var q = query.trim().toLowerCase();
          var games = allGames.filter(function (g) {
            if (currentCat !== "all" && g.category !== currentCat) return false;
            if (q && g.name.toLowerCase().indexOf(q) === -1) return false;
            return true;
          });
          N = games.length;
          if (!N) { tip.textContent = "No games match"; return; }
          tip.textContent = "";
          games.forEach(function (g, i) {
            var el = document.createElement("div");
            el.className = "card";
            var img = document.createElement("img");
            img.loading = "lazy"; img.alt = "";
            img.src = "../posters/" + g.file.replace(/\.[^.]+$/, "") + ".png";
            img.addEventListener("error", function () { img.remove(); });
            el.appendChild(img);
            var nm = document.createElement("div");
            nm.className = "nm"; nm.textContent = g.name;
            el.appendChild(nm);
            el.dataset.i = i;
            line.appendChild(el);
            cards.push({ el: el, game: g });
          });
          offset = 0;
          layout();
        }

        // endless conveyor: cards wrap around a band wider than the screen
        function layout() {
          var w = cardW(), gap = 18, step = w + gap;
          span = Math.max(N * step, window.innerWidth + step * 2);
          var mid = window.innerWidth / 2;
          var active = null, activeDist = 1e9;
          cards.forEach(function (c, i) {
            var x = ((i * step + offset) % span + span) % span;
            var left = x - step;                    // one card of lead-in off-screen
            var centreX = left + w / 2;
            var d = centreX - mid;
            var vis = left > -step * 1.5 && left < window.innerWidth + step * 0.5;
            c.el.style.display = vis ? "" : "none";
            if (!vis) return;
            // cover-flow-lite: tilt + shrink + sink away from the centre
            var t = Math.max(-1, Math.min(1, d / (mid + w)));
            var ry = t * -28;
            var sc = 1.08 - Math.min(0.22, Math.abs(t) * 0.28);
            c.el.style.transform = "translate3d(" + left + "px,0,0) perspective(900px) rotateY(" + ry + "deg) scale(" + sc + ")";
            c.el.style.zIndex = String(1000 - Math.round(Math.abs(d)));
            var ad = Math.abs(d);
            if (ad < activeDist) { activeDist = ad; active = c; }
          });
          cards.forEach(function (c) { c.el.classList.toggle("active", c === active); });
          if (active) tip.textContent = active.game.name;
          return active;
        }

        // ---- motion: calm auto-flow, drag scrub, wheel, inertia ---------
        var auto = 110;                // px/s
        var vel = 0, dragging = false, lastX = 0, moved = 0, downAt = 0, idleAt = 0;
        function onDown(e) { dragging = true; stage.classList.add("dragging"); moved = 0; lastX = e.clientX; vel = 0; downAt = Date.now(); }
        function onMove(e) {
          if (!dragging) return;
          var dx = e.clientX - lastX; lastX = e.clientX;
          moved += Math.abs(dx);
          offset += dx; vel = dx;
          layout();
        }
        function onUp(e) {
          if (!dragging) return;
          dragging = false; stage.classList.remove("dragging");
          idleAt = Date.now();
          if (moved < 10 && Date.now() - downAt < 800) pick(e);
        }
        stage.addEventListener("pointerdown", onDown);
        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);
        window.addEventListener("wheel", function (e) {
          offset -= (e.deltaY + e.deltaX) * 0.9;
          idleAt = Date.now();
          layout();
        }, { passive: true });
        window.addEventListener("keydown", function (e) {
          if (e.target === qEl) return;
          var step = cardW() + 18;
          if (e.key === "ArrowLeft") { offset += step; idleAt = Date.now(); layout(); e.preventDefault(); }
          else if (e.key === "ArrowRight") { offset -= step; idleAt = Date.now(); layout(); e.preventDefault(); }
          else if (e.key === "Enter") {
            var a = layout();
            if (a) launch(a.game, a.el);
            e.preventDefault();
          }
        });

        function launch(g, el) {
          if (el) el.classList.add("active");
          tip.textContent = "▶ " + g.name;
          var url = launchUrl(g);
          setTimeout(function () { location.href = url; }, 200);
        }
        function pick(e) {
          var el = e.target && e.target.closest && e.target.closest(".card");
          if (!el) return;
          var c = cards[+el.dataset.i];
          if (c) launch(c.game, el);
        }

        CATS.forEach(function (c) {
          var b = document.createElement("button");
          b.type = "button";
          b.className = "chip" + (c[0] === "all" ? " active" : "");
          b.textContent = c[1];
          b.addEventListener("click", function () {
            currentCat = c[0];
            [].forEach.call(bar.querySelectorAll(".chip"), function (x) { x.classList.remove("active"); });
            b.classList.add("active");
            rebuild();
          });
          bar.appendChild(b);
        });
        qEl.addEventListener("input", function () { query = qEl.value; rebuild(); });

        window.addEventListener("resize", function () { applySizes(); layout(); });

        // starfield (2D canvas, cheap)
        (function stars() {
          var cv = document.getElementById("stars"), cx = cv.getContext("2d"), pts = [];
          function fit() { cv.width = innerWidth; cv.height = innerHeight; }
          fit(); window.addEventListener("resize", fit);
          for (var i = 0; i < 130; i++) pts.push({ x: Math.random(), y: Math.random(), s: Math.random() * 1.6 + 0.4, v: Math.random() * 8 + 3 });
          setInterval(function () {
            cx.clearRect(0, 0, cv.width, cv.height);
            cx.fillStyle = "rgba(92,200,255,.7)";
            pts.forEach(function (p) {
              p.x -= p.v / 10000; if (p.x < 0) p.x += 1;
              cx.globalAlpha = 0.25 + p.s * 0.3;
              cx.fillRect(p.x * cv.width, p.y * cv.height, p.s, p.s);
            });
            cx.globalAlpha = 1;
          }, 66);
        })();

        var last = performance.now();
        function tick(now) {
          requestAnimationFrame(tick);
          var dt = Math.min(0.05, (now - last) / 1000); last = now;
          if (!dragging) {
            if (Math.abs(vel) > 0.4) { offset += vel; vel *= 0.94; layout(); }
            else if (Date.now() - idleAt > 3500) { offset -= auto * dt; layout(); }
          }
        }

        fetch("../games.json", { cache: "no-cache" })
          .then(function (r) { return r.json(); })
          .then(function (d) {
            allGames = (d && d.games) || [];
            rebuild();
            requestAnimationFrame(tick);
            loading.style.opacity = 0;
            setTimeout(function () { loading.remove(); }, 400);
          })
          .catch(function () { loading.textContent = "Could not load the game list."; });
      })();
    </script>
    <script data-goatcounter="https://atari-arcade.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
  </body>
</html>
