<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Atari Arcade — 3D</title>
    <meta name="theme-color" content="#0d1117" />
    <link rel="icon" href="../icons/icon-192.png" />
    <style>
      :root { --accent: #5cc8ff; --muted: #9db0d3; --border: rgba(255,255,255,.18); }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: #05070c; overflow: hidden;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
      #gl { position: fixed; inset: 0; display: block; touch-action: none; cursor: grab; }
      .ui { position: fixed; left: 0; right: 0; text-align: center; color: #e6eefc; z-index: 2; }
      .ui.top { top: calc(env(safe-area-inset-top, 0px) + 10px); pointer-events: none; }
      .ui.top h1 { margin: 0; font-size: 19px; letter-spacing: .1em; font-weight: 800;
                   text-shadow: 0 0 18px rgba(92,200,255,.6); }
      .ui.top h1 span { color: var(--accent); }
      .bar { margin: 8px auto 0; display: flex; flex-wrap: wrap; justify-content: center;
             gap: 6px; max-width: 96vw; pointer-events: auto; }
      .bar input {
        width: min(220px, 40vw);
        padding: 7px 12px; font-size: 13px;
        border-radius: 999px; border: 1px solid var(--border);
        background: rgba(19,26,38,.8); color: #e6eefc; outline: none;
      }
      .bar input:focus { border-color: var(--accent); }
      .chip { border: 1px solid var(--border); background: rgba(19,26,38,.8);
              color: var(--muted); border-radius: 999px; padding: 6px 12px;
              font-size: 12px; cursor: pointer; }
      .chip.active { border-color: var(--accent); color: var(--accent); }
      #tip { position: fixed; left: 50%; transform: translateX(-50%);
             bottom: calc(env(safe-area-inset-bottom, 0px) + 58px);
             color: #e6eefc; font-size: 16px; font-weight: 800; z-index: 2;
             letter-spacing: .03em;
             text-shadow: 0 0 12px rgba(92,200,255,.9); pointer-events: none;
             opacity: 0; transition: opacity .15s; }
      .ui.bottom { bottom: calc(env(safe-area-inset-bottom, 0px) + 12px); pointer-events: none; }
      .ui.bottom a { pointer-events: auto; color: var(--accent); text-decoration: none;
                     font-size: 13px; border: 1px solid rgba(92,200,255,.4);
                     border-radius: 999px; padding: 7px 16px; background: rgba(13,17,23,.6); }
      .ui.bottom .hint { display: block; color: var(--muted); font-size: 11px; margin-top: 6px; }
      #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
                 color: var(--muted); font-size: 14px; z-index: 3; background: #05070c;
                 transition: opacity .4s; }
    </style>
  </head>
  <body>
    <canvas id="gl"></canvas>
    <div class="ui top">
      <h1>ATARI <span>ARCADE</span> · 3D</h1>
      <div class="bar" id="bar">
        <input type="search" id="q" placeholder="Search…" autocomplete="off" />
      </div>
    </div>
    <div id="tip"></div>
    <div class="ui bottom">
      <a href="../">&larr; classic view</a>
      <span class="hint">drag or &larr;&rarr; to spin &middot; tap the front poster (or Enter) to play</span>
    </div>
    <div id="loading">Booting the arcade room&hellip;</div>

    <script src="three.min.js"></script>
    <script>
      (function () {
        "use strict";
        var canvas = document.getElementById("gl");
        var tip = document.getElementById("tip");
        var loading = document.getElementById("loading");
        var bar = document.getElementById("bar");
        var qEl = document.getElementById("q");
        var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, preserveDrawingBuffer: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        var scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x05070c, 11, 42);
        var camera = new THREE.PerspectiveCamera(64, 1, 0.1, 100);

        (function stars() {
          var g = new THREE.BufferGeometry();
          var n = 900, pos = new Float32Array(n * 3);
          for (var i = 0; i < n; i++) {
            var r = 30 + Math.random() * 40;
            var t = Math.random() * Math.PI * 2;
            var p = Math.acos(2 * Math.random() - 1);
            pos[i * 3] = r * Math.sin(p) * Math.cos(t);
            pos[i * 3 + 1] = r * Math.cos(p);
            pos[i * 3 + 2] = r * Math.sin(p) * Math.sin(t);
          }
          g.setAttribute("position", new THREE.BufferAttribute(pos, 3));
          scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0x5cc8ff, size: 0.06, transparent: true, opacity: 0.7, fog: false })));
        })();

        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        var group = new THREE.Group();
        scene.add(group);

        var CARD_W = 4.6, CARD_H = 3.92, CARD_D = 0.16;
        var tvMode = false;
        try { tvMode = new URLSearchParams(location.search).get("tv") === "1"; } catch (e) {}

        var CATS = [["all","All"],["shooter","Shooters"],["platformer","Platformers"],
                    ["maze","Maze"],["racing","Racing"],["action","Action"],["sports","Sports"]];
        var allGames = [], currentCat = "all", query = "";

        function launchUrl(g) {
          var url = "../emu/?lib=" + encodeURIComponent(g.file) +
            "&fs=1&pal=1&crt=0&experience=convenient&addons=off";
          if (g.joystick) url += "&joystick=" + encodeURIComponent(g.joystick);
          if (g.tilt) url += "&tilt=1";
          url += "&back_url=../3d/&back_label=" + encodeURIComponent("⬅ Games");
          if (tvMode) url += "&tv=1";
          return url;
        }

        var texCache = {};
        function getTexture(g, apply) {
          if (texCache[g.file]) { apply(texCache[g.file]); return; }
          function bake(img) {
            var c = document.createElement("canvas");
            c.width = 336; c.height = 286;
            var x = c.getContext("2d");
            x.fillStyle = "#000"; x.fillRect(0, 0, 336, 286);
            if (img) x.drawImage(img, 0, 0, 336, 240);
            x.fillStyle = "#131a26"; x.fillRect(0, 240, 336, 46);
            x.strokeStyle = "rgba(92,200,255,.35)"; x.strokeRect(0.5, 0.5, 335, 285);
            x.fillStyle = "#e6eefc";
            x.font = "700 22px system-ui, sans-serif";
            x.textAlign = "center"; x.textBaseline = "middle";
            var label = g.name.length > 26 ? g.name.slice(0, 25) + "…" : g.name;
            x.fillText(label, 168, 264);
            var t = new THREE.CanvasTexture(c);
            t.anisotropy = renderer.capabilities.getMaxAnisotropy();
            texCache[g.file] = t;
            apply(t);
          }
          var img = new Image();
          img.onload = function () { bake(img); };
          img.onerror = function () { bake(null); };
          img.src = "../posters/" + g.file.replace(/\.[^.]+$/, "") + ".png";
        }

        var pickables = [], slot = Math.PI * 2, R = 10;
        function rebuild() {
          while (group.children.length) {
            var m = group.children[0];
            group.remove(m);
            if (m.geometry) m.geometry.dispose();
          }
          pickables = [];
          var q = query.trim().toLowerCase();
          var games = allGames.filter(function (g) {
            if (currentCat !== "all" && g.category !== currentCat) return false;
            if (q && g.name.toLowerCase().indexOf(q) === -1) return false;
            return true;
          });
          if (!games.length) { slot = Math.PI * 2; return; }
          // ONE wheel of thin boxes (spinning shows their sides, like album
          // covers) with a faded floor reflection. The camera stands just
          // inside the wall: front card big, neighbours fan into the fog,
          // and the off-centre position gives every card a distinct
          // distance so clicks are unambiguous.
          var spacing = games.length > 30 ? 2.7 : (CARD_W + 0.7);
          R = Math.max(7.5, games.length * spacing / (2 * Math.PI));
          slot = (Math.PI * 2) / games.length;
          games.forEach(function (g, i) {
            var theta = i * slot;
            var faceMat = new THREE.MeshBasicMaterial({ color: 0x0d1117 });
            var sideMat = new THREE.MeshBasicMaterial({ color: 0x1a2233 });
            var mesh = new THREE.Mesh(new THREE.BoxGeometry(CARD_W, CARD_H, CARD_D),
              [sideMat, sideMat, sideMat, sideMat, faceMat, sideMat]);
            mesh.position.set(R * Math.sin(theta), 0, -R * Math.cos(theta));
            mesh.lookAt(0, 0, 0);
            mesh.userData = { game: g, home: mesh.position.clone(), theta: theta };
            group.add(mesh);
            pickables.push(mesh);
            var rMat = new THREE.MeshBasicMaterial({ color: 0x0d1117, transparent: true, opacity: 0.16 });
            var refl = new THREE.Mesh(new THREE.PlaneGeometry(CARD_W, CARD_H), rMat);
            refl.position.set(mesh.position.x, -CARD_H - 0.06, mesh.position.z);
            refl.lookAt(0, -CARD_H - 0.06, 0);
            refl.scale.y = -1;
            group.add(refl);
            getTexture(g, function (t) {
              faceMat.map = t; faceMat.color.set(0xffffff); faceMat.needsUpdate = true;
              rMat.map = t; rMat.color.set(0x8899bb); rMat.needsUpdate = true;
            });
          });
          camera.position.set(0, 0.15, -(Math.max(0, R - 7.6)));
          camera.rotation.set(0, 0, 0);
          rotY = 0; vel = 0; snapTo = 0;
        }

        CATS.forEach(function (c) {
          var b = document.createElement("button");
          b.type = "button";
          b.className = "chip" + (c[0] === "all" ? " active" : "");
          b.textContent = c[1];
          b.addEventListener("click", function () {
            currentCat = c[0];
            [].forEach.call(bar.querySelectorAll(".chip"), function (x) { x.classList.remove("active"); });
            b.classList.add("active");
            rebuild();
          });
          bar.appendChild(b);
        });
        qEl.addEventListener("input", function () { query = qEl.value; rebuild(); });

        // ---- spin: drag + inertia, then SNAP one poster front & centre --
        var rotY = 0, vel = 0, snapTo = 0, dragging = false, lastX = 0, movedPx = 0, downAt = 0;
        function nearestSlot(a) { return Math.round(a / slot) * slot; }
        function onDown(e) { dragging = true; movedPx = 0; lastX = e.clientX; vel = 0; downAt = Date.now(); }
        function onMove(e) {
          if (!dragging) { hover(e); return; }
          var dx = e.clientX - lastX; lastX = e.clientX;
          movedPx += Math.abs(dx);
          var d = dx * 0.0022;
          rotY += d; vel = d;
        }
        function onUp(e) {
          if (!dragging) return;
          dragging = false;
          snapTo = nearestSlot(rotY + vel * 14);   // inertia picks the card, then settle
          if (movedPx < 14 && Date.now() - downAt < 800) pick(e);
        }
        canvas.addEventListener("pointerdown", onDown);
        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);
        window.addEventListener("keydown", function (e) {
          if (e.target === qEl) return;
          if (e.key === "ArrowLeft") { snapTo = nearestSlot(rotY) - slot; e.preventDefault(); }
          else if (e.key === "ArrowRight") { snapTo = nearestSlot(rotY) + slot; e.preventDefault(); }
          else if (e.key === "Enter") { var f = frontMesh(); if (f) launch(f); e.preventDefault(); }
        });

        function frontMesh() {
          // front = the card whose world position is nearest the camera
          var best = null, bestD = 1e9;
          var cp = camera.position;
          pickables.forEach(function (m) {
            var wp = new THREE.Vector3();
            m.getWorldPosition(wp);
            var d = wp.distanceTo(cp);
            if (d < bestD) { bestD = d; best = m; }
          });
          return best;
        }

        var ray = new THREE.Raycaster(), ndc = new THREE.Vector2();
        function cast(e) {
          ndc.x = (e.clientX / window.innerWidth) * 2 - 1;
          ndc.y = -(e.clientY / window.innerHeight) * 2 + 1;
          ray.setFromCamera(ndc, camera);
          var hit = ray.intersectObjects(pickables)[0];
          return hit ? hit.object : null;
        }
        var hovered = null;
        function setHover(m, on) {
          m.scale.set(on ? 1.05 : 1, on ? 1.05 : 1, 1);
          m.position.copy(m.userData.home);
          if (on) {
            var toCam = m.position.clone().multiplyScalar(-0.05);
            toCam.y = 0;
            m.position.add(toCam);
          }
        }
        function hover(e) {
          var m = cast(e);
          if (m !== hovered) {
            if (hovered) setHover(hovered, false);
            hovered = m;
            if (m) { setHover(m, true); tip.textContent = m.userData.game.name; tip.style.opacity = 1; canvas.style.cursor = "pointer"; }
            else { tip.textContent = ""; tip.style.opacity = 0; canvas.style.cursor = "grab"; }
          }
        }
        function launch(m) {
          setHover(m, true);
          tip.textContent = "▶ " + m.userData.game.name;
          tip.style.opacity = 1;
          var url = launchUrl(m.userData.game);
          setTimeout(function () { location.href = url; }, 230);
        }
        function pick(e) {
          var m = hovered || cast(e);
          if (m) launch(m);
        }

        function resize() {
          renderer.setSize(window.innerWidth, window.innerHeight, false);
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
        }
        window.addEventListener("resize", resize);
        resize();

        var clock = new THREE.Clock();
        function tick() {
          requestAnimationFrame(tick);
          var dt = clock.getDelta();
          if (!dragging) {
            if (Math.abs(vel) > 0.0006) {
              rotY += vel; vel *= 0.955;
              snapTo = nearestSlot(rotY);
            } else {
              rotY += (snapTo - rotY) * Math.min(1, dt * 6);
            }
          }
          group.rotation.y = rotY;
          var f = frontMesh();
          if (f && f !== hovered) f.scale.set(1.04, 1.04, 1);
          pickables.forEach(function (m) { if (m !== hovered && m !== f) m.scale.set(1, 1, 1); });
          renderer.render(scene, camera);
        }

        fetch("../games.json", { cache: "no-cache" })
          .then(function (r) { return r.json(); })
          .then(function (d) {
            allGames = (d && d.games) || [];
            rebuild();
            tick();
            loading.style.opacity = 0;
            setTimeout(function () { loading.remove(); }, 500);
          })
          .catch(function () { loading.textContent = "Could not load the game list."; });
      })();
    </script>
    <script data-goatcounter="https://atari-arcade.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
  </body>
</html>
