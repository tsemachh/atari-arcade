<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Atari Arcade</title>
    <meta name="theme-color" content="#0d1117" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Atari" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="icon" href="icons/icon-192.png" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --panel: #161d2b;
        --panel2: #131a26;
        --text: #e6eefc;
        --muted: #9db0d3;
        --border: rgba(255, 255, 255, 0.09);
        --accent: #5cc8ff;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      }
      header {
        padding: calc(env(safe-area-inset-top, 0px) + 18px) 18px 8px;
        text-align: center;
      }
      h1 {
        margin: 0;
        font-size: 26px;
        letter-spacing: 0.06em;
        font-weight: 800;
      }
      h1 .accent { color: var(--accent); }
      .sub {
        color: var(--muted);
        font-size: 13px;
        margin-top: 4px;
      }
      .search {
        display: block;
        width: min(480px, calc(100% - 36px));
        margin: 14px auto 4px;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel2);
        color: var(--text);
        font-size: 15px;
        outline: none;
      }
      .search:focus { border-color: var(--accent); }
      .chips {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        padding: 10px 14px 0;
        max-width: 1100px;
        margin: 0 auto;
      }
      .chip {
        text-decoration: none;
        display: inline-block;
        border: 1px solid var(--border);
        background: var(--panel2);
        color: var(--muted);
        border-radius: 999px;
        padding: 6px 14px;
        font-size: 13px;
        cursor: pointer;
      }
      .chip.active {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(16, 38, 61, 0.6);
      }
      .recent-wrap {
        max-width: 1100px;
        margin: 12px auto 2px;
        padding: 0 14px;
      }
      .recent-wrap[hidden] { display: none; }
      .recent-title {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: .04em;
        text-transform: uppercase;
        margin: 0 2px 6px;
      }
      .recent-row {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 4px;
      }
      .recent-row .card {
        /* same footprint as the grid cards for a consistent look */
        flex: 0 0 170px;
        width: 170px;
        min-height: 0;
        position: relative;
      }
      .recent-row .rm {
        position: absolute;
        top: 4px; right: 4px;
        width: 22px; height: 22px;
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,.3);
        background: rgba(13,17,23,.75);
        color: var(--muted);
        font-size: 12px; line-height: 1;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
      .recent-row .rm:hover { color: #ff8a80; border-color: #ff8a80; }
      .reqlink { color: var(--accent); text-decoration: none; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 10px;
        padding: 14px 14px calc(env(safe-area-inset-bottom, 0px) + 20px);
        max-width: 1100px;
        margin: 0 auto;
      }
      .card {
        display: flex;
        flex-direction: column;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, var(--panel), var(--panel2));
        color: var(--text);
        text-decoration: none;
        transition: border-color 0.12s;
        overflow: hidden;
      }
      .card .shot {
        width: 100%;
        aspect-ratio: 336 / 240;
        object-fit: cover;
        display: block;
        background: #000;
        border-bottom: 1px solid var(--border);
      }
      .card .meta {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 10px 12px 12px;
      }
      .card:hover, .card:focus-visible { border-color: var(--accent); }
      .card .name {
        font-weight: 700;
        font-size: 15px;
        line-height: 1.25;
      }
      .card .desc {
        color: var(--muted);
        font-size: 12px;
      }
      .footer {
        text-align: center;
        color: var(--muted);
        font-size: 12px;
        padding: 6px 16px calc(env(safe-area-inset-bottom, 0px) + 26px);
      }
      .footer a { color: var(--accent); text-decoration: none; }
      #installBtn {
        display: block;
        margin: 4px auto 14px;
        padding: 10px 20px;
        border-radius: 10px;
        border: 1px solid rgba(92, 200, 255, 0.5);
        background: rgba(16, 38, 61, 0.6);
        color: var(--accent);
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
      }
      #installBtn[hidden] { display: none; }
      .status { text-align: center; color: var(--muted); padding: 24px; }
    </style>
  </head>
  <body>
    <header>
      <h1>ATARI <span class="accent">ARCADE</span></h1>
      <div class="sub">Atari 800 XL &middot; powered by AltirraSDL (cycle-accurate, WebAssembly)</div>
      <button type="button" id="installBtn" hidden>&#x2B07; Install as app</button>
    </header>
    <div id="recentWrap" class="recent-wrap" hidden>
      <div class="recent-title">Recently played</div>
      <div id="recentRow" class="recent-row"></div>
    </div>
    <input type="search" id="search" class="search" placeholder="Search games…" autocomplete="off" />
    <div id="chips" class="chips"></div>
    <div id="grid" class="grid"></div>
    <div id="status" class="status">Loading game list…</div>
    <div class="footer">
      <span id="buildLine">&nbsp;</span><br />
      Emulation by <a href="https://github.com/ilmenit/AltirraSDL" rel="noopener">AltirraSDL</a>
      / <a href="https://www.virtualdub.org/altirra.html" rel="noopener">Altirra</a> &middot;
      <a id="emuDirect" href="emu/">open emulator directly</a> &middot;
      <a href="?tv=1" id="tvLink">&#128250; TV mode</a> &middot;
      <a href="https://github.com/tsemachh/atari-arcade" rel="noopener">source on GitHub</a>
    </div>

    <script>
      (function () {
        "use strict";
        var grid = document.getElementById("grid");
        var statusEl = document.getElementById("status");
        var searchEl = document.getElementById("search");
        var chipsEl = document.getElementById("chips");
        var recentWrap = document.getElementById("recentWrap");
        var recentRow = document.getElementById("recentRow");
        var allGames = [];
        var currentCat = "all";
        var CATS = [
          ["all", "All"],
          ["shooter", "Shooters"],
          ["platformer", "Platformers"],
          ["maze", "Maze & Puzzle"],
          ["racing", "Racing"],
          ["action", "Action"],
          ["sports", "Sports"]
        ];

        // --- Recently played (localStorage, newest first, max 8) ---
        var RECENT_KEY = "arcade-recent";
        function getRecent() {
          try { return JSON.parse(localStorage.getItem(RECENT_KEY)) || []; }
          catch (e) { return []; }
        }
        function recordPlay(file) {
          try {
            var r = getRecent().filter(function (f) { return f !== file; });
            r.unshift(file);
            localStorage.setItem(RECENT_KEY, JSON.stringify(r.slice(0, 8)));
          } catch (e) { /* private mode etc. */ }
        }
        function removeRecent(file) {
          try {
            localStorage.setItem(RECENT_KEY,
              JSON.stringify(getRecent().filter(function (f) { return f !== file; })));
          } catch (e) { /* ignore */ }
          renderRecent();
        }
        function makeCard(g, mini) {
          var a = document.createElement("a");
          a.className = "card";
          a.href = launchUrl(g);
          a.dataset.file = g.file;
          var img = document.createElement("img");
          img.className = "shot";
          img.loading = "lazy";
          img.alt = "";
          img.src = "posters/" + g.file.replace(/\.[^.]+$/, "") + ".png";
          img.addEventListener("error", function () { img.remove(); });
          a.appendChild(img);
          var meta = document.createElement("span");
          meta.className = "meta";
          var name = document.createElement("span");
          name.className = "name";
          name.textContent = g.name;
          meta.appendChild(name);
          if (!mini && g.description) {
            var d = document.createElement("span");
            d.className = "desc";
            d.textContent = g.description;
            meta.appendChild(d);
          }
          a.appendChild(meta);
          return a;
        }
        function renderRecent() {
          var byFile = {};
          allGames.forEach(function (g) { byFile[g.file] = g; });
          var games = getRecent().map(function (f) { return byFile[f]; }).filter(Boolean);
          recentWrap.hidden = games.length === 0 || currentCat !== "all";
          recentRow.textContent = "";
          games.slice(0, 6).forEach(function (g) {
            var card = makeCard(g, true);
            var rm = document.createElement("button");
            rm.type = "button";
            rm.className = "rm";
            rm.setAttribute("aria-label", "Remove from recently played");
            rm.textContent = "\u00d7";
            rm.addEventListener("click", function (e) {
              e.preventDefault();
              e.stopPropagation();
              removeRecent(g.file);
            });
            card.appendChild(rm);
            recentRow.appendChild(card);
          });
        }
        function renderChips() {
          chipsEl.textContent = "";
          CATS.forEach(function (c) {
            var b = document.createElement("button");
            b.type = "button";
            b.className = "chip" + (currentCat === c[0] ? " active" : "");
            b.textContent = c[1];
            b.addEventListener("click", function () {
              currentCat = c[0];
              renderChips();
              renderRecent();
              render(searchEl.value);
            });
            chipsEl.appendChild(b);
          });
          var td = document.createElement("a");
          td.className = "chip";
          td.href = "3d/" + (location.search.indexOf("tv=1") > -1 ? "?tv=1" : "");
          td.textContent = "\uD83D\uDD79 3D view";
          chipsEl.appendChild(td);
        }

        // --- "Can't find a game" → log the miss + offer a request link ---
        var missTimer = null;
        function reportMiss(term) {
          if (missTimer) clearTimeout(missTimer);
          missTimer = setTimeout(function () {
            try {
              if (window.goatcounter && window.goatcounter.count) {
                window.goatcounter.count({
                  path: "/request/" + term.toLowerCase(),
                  title: "game request",
                  event: true
                });
              }
            } catch (e) { /* ignore */ }
          }, 1200);
        }

        // Launch options: fast disk loading, stock 800XL (best compatibility
        // for 80s titles), back-button returns to this picker.
        function launchUrl(game) {
          var url =
            "emu/?lib=" + encodeURIComponent(game.file) +
            "&fs=1&pal=1&crt=0&experience=convenient&addons=off";
          // Per-game touch-joystick style (analog / dpad8 / dpad4). Omitted
          // games fall back to the emulator default (analog).
          if (game.joystick) {
            url += "&joystick=" + encodeURIComponent(game.joystick);
          }
          // Tilt steering (device orientation → joystick) for games that
          // suit it; handled by the ARCADE-PATCH block in emu/index.html.
          if (game.tilt) {
            url += "&tilt=1";
          }
          url += "&back_url=../&back_label=" + encodeURIComponent("⬅ Games");
          // Opening the picker with ?tv=1 (smart-TV browsers) propagates
          // TV-remote controls into every game launch.
          try {
            if (new URLSearchParams(location.search).get("tv") === "1") url += "&tv=1&filter=point";
          } catch (e) { /* ignore */ }
          return url;
        }

        function render(filter) {
          var norm = (filter || "").trim().toLowerCase();
          grid.textContent = "";
          var shown = 0;
          allGames.forEach(function (g) {
            if (norm && g.name.toLowerCase().indexOf(norm) === -1) return;
            if (currentCat !== "all" && g.category !== currentCat) return;
            grid.appendChild(makeCard(g, false));
            shown++;
          });
          if (shown) {
            statusEl.textContent = "";
          } else {
            statusEl.innerHTML =
              'No games match. <a class="reqlink" target="_blank" rel="noopener" ' +
              'href="https://github.com/tsemachh/atari-arcade/issues/new?title=' +
              encodeURIComponent("Game request: " + (filter || "").trim()) +
              '&body=' + encodeURIComponent("Please add this game to the arcade: " + (filter || "").trim()) +
              '">Request this game &rarr;</a>';
            if (norm.length >= 2) reportMiss(norm);
          }
        }

        fetch("games.json", { cache: "no-cache" })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            allGames = (data && data.games) || [];
            statusEl.textContent = "";
            renderChips();
            renderRecent();
            render("");
          })
          .catch(function () {
            statusEl.textContent = "Could not load the game list.";
          });

        searchEl.addEventListener("input", function () {
          render(searchEl.value);
        });

        // Auto-fullscreen on touch devices: enter fullscreen during the tap
        // (a user gesture), then navigate — Chrome keeps fullscreen across
        // same-origin navigation, so the emulator starts already fullscreen.
        // iPhones lack the fullscreen API; there the PWA install covers it.
        document.addEventListener("click", function (e) {
          var a = e.target && e.target.closest && e.target.closest("a.card");
          if (a && a.dataset.file) recordPlay(a.dataset.file);
        }, true);

        grid.addEventListener("click", function (e) {
          if ((navigator.maxTouchPoints || 0) === 0) return; // desktop: normal
          var a = e.target && e.target.closest && e.target.closest("a.card");
          if (!a) return;
          var root = document.documentElement;
          if (!root.requestFullscreen || document.fullscreenElement) return;
          e.preventDefault();
          var href = a.href;
          var go = function () { window.location.href = href; };
          try {
            var p = root.requestFullscreen({ navigationUI: "hide" });
            if (p && typeof p.then === "function") {
              p.then(go, go);
              return;
            }
          } catch (err) { /* fall through */ }
          go();
        });

        // Deep link: ?rom=<name> jumps straight into the emulator.
        try {
          var wanted = new URLSearchParams(location.search).get("rom");
          if (wanted) {
            fetch("games.json", { cache: "no-cache" })
              .then(function (r) { return r.json(); })
              .then(function (data) {
                var g = (data.games || []).find(function (e) {
                  return e.name.toLowerCase() === wanted.toLowerCase() ||
                         e.file.toLowerCase() === wanted.toLowerCase();
                });
                if (g) location.href = launchUrl(g);
              });
          }
        } catch (e) { /* ignore */ }

        // TV-mode footer link doubles as an exit when already active.
        try {
          if (new URLSearchParams(location.search).get("tv") === "1") {
            var tl = document.getElementById("tvLink");
            tl.textContent = "\uD83D\uDCFA TV mode: on (exit)";
            tl.href = location.pathname;
          }
        } catch (e) { /* ignore */ }

        // Deploy stamp (network-first via SW so never stale).
        fetch("build-info.json", { cache: "no-cache" })
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (info) {
            if (info && info.deployedAt) {
              document.getElementById("buildLine").textContent =
                "Deployed: " + info.deployedAt + (info.commit ? " (" + info.commit + ")" : "");
            }
          })
          .catch(function () { /* offline */ });

        // PWA
        if ("serviceWorker" in navigator) {
          window.addEventListener("load", function () {
            navigator.serviceWorker.register("sw.js").catch(function () {});
          });
        }
        var deferredPrompt = null;
        var installBtn = document.getElementById("installBtn");
        var standalone =
          (window.matchMedia && (window.matchMedia("(display-mode: standalone)").matches ||
                                 window.matchMedia("(display-mode: fullscreen)").matches)) ||
          window.navigator.standalone === true;
        window.addEventListener("beforeinstallprompt", function (e) {
          e.preventDefault();
          deferredPrompt = e;
          if (!standalone) installBtn.hidden = false;
        });
        var isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
        if (isIos && !standalone) installBtn.hidden = false;
        installBtn.addEventListener("click", function () {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function () {
              installBtn.hidden = true;
              deferredPrompt = null;
            });
            return;
          }
          alert(isIos
            ? "Install on iPhone/iPad: tap Share in Safari, then 'Add to Home Screen'."
            : "Install: open the browser menu and choose 'Install app' / 'Add to Home Screen'.");
        });
        window.addEventListener("appinstalled", function () { installBtn.hidden = true; });
      })();
    </script>
    <script data-goatcounter="https://atari-arcade.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
  </body>
</html>
